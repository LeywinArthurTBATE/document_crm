<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Документооборот{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            background-color: #f8fafc;
        }
        .transition-fast {
            transition: all 0.2s ease;
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-gray-50 font-sans antialiased">

    <!-- Навигация -->
    <nav class="bg-white border-b border-blue-100 shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <a href="/" class="text-xl font-semibold text-blue-600 hover:text-blue-800 transition-fast">
                        <i class="fas fa-file-alt mr-2"></i>DocFlow
                    </a>
                </div>
                <div class="flex items-center space-x-4" id="user-nav">
                    <!-- динамическое содержимое: имя пользователя и кнопка выхода -->
                </div>
            </div>
        </div>
    </nav>

    <!-- Основной контент -->
    <main class="max-w-7xl mx-auto py-6 px-4 sm:px-6 lg:px-8">
        {% block content %}{% endblock %}
    </main>

    <footer class="bg-white border-t border-blue-100 mt-12 py-4 text-center text-gray-500 text-sm">
        &copy; 2025 Документооборот
    </footer>

    <script>
        // Глобальные функции для работы с токеном
        function getToken() {
            return localStorage.getItem('access_token');
        }

        function setToken(token) {
            if (token) localStorage.setItem('access_token', token);
            else localStorage.removeItem('access_token');
        }

        function logout() {
            setToken(null);
            window.location.href = '/login';
        }

        // Проверка авторизации и отображение навигации
        function updateNav() {
            const token = getToken();
            const nav = document.getElementById('user-nav');
            if (!token) {
                nav.innerHTML = `
                    <a href="/login" class="text-gray-700 hover:text-blue-600 transition-fast">
                        <i class="fas fa-sign-in-alt mr-1"></i>Вход
                    </a>
                `;

                return;
            }
            // Если есть токен, показываем кнопку выхода (имя можно получить из /users/me)
            fetch('/users/me', {
                headers: { 'Authorization': `Bearer ${token}` }
            })
            .then(res => res.ok ? res.json() : null)
            .then(user => {
                if (user) {
                    nav.innerHTML = `
                        <span class="text-gray-700"><i class="fas fa-user mr-1"></i>${user.full_name}</span>
                        <button onclick="logout()" class="text-red-500 hover:text-red-700 transition-fast">
                            <i class="fas fa-sign-out-alt mr-1"></i>Выйти
                        </button>
                    `;
                } else {
                    // токен невалиден
                    setToken(null);
                    nav.innerHTML = `<a href="/login" class="text-gray-700 hover:text-blue-600">Вход</a>`;
                }
                if (user.role.code === 'ADMIN') {
                    nav.innerHTML += `
                        <a href="/admin/users">Пользователи</a>
                    `
                }
            })
            .catch(() => {
                nav.innerHTML = `<a href="/login" class="text-gray-700 hover:text-blue-600">Вход</a>`;
            });
        }

        document.addEventListener('DOMContentLoaded', updateNav);
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
