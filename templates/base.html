<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Документооборот{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* Глобальные стили и анимации */
        body {
            background: linear-gradient(135deg, #f8fafc 0%, #eef2f6 100%);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        /* Кастомный скроллбар */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        /* Плавные переходы */
        .transition-fast {
            transition: all 0.2s ease;
        }
        .transition-smooth {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Анимация для всплывающих уведомлений */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Стили для аватара и выпадающего меню */
        .avatar {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            border-radius: 9999px;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            transition: transform 0.2s;
        }
        .avatar:hover {
            transform: scale(1.05);
        }
        .dropdown-menu {
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.2s ease;
        }
        .dropdown:hover .dropdown-menu {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        /* Анимация для карточек (будет использоваться в дочерних шаблонах) */
        .fade-in {
            animation: fadeInUp 0.4s ease forwards;
        }

        /* Мобильное меню */
        @media (max-width: 768px) {
            .mobile-menu {
                display: none;
            }
            .mobile-menu.open {
                display: block;
                position: fixed;
                top: 64px;
                left: 0;
                right: 0;
                background: white;
                box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
                padding: 1rem;
                z-index: 40;
                border-bottom: 1px solid #e2e8f0;
            }
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body class="min-h-screen flex flex-col font-sans antialiased">
    <!-- Навигация -->
    <nav class="bg-white/80 backdrop-blur-md border-b border-blue-100 shadow-sm sticky top-0 z-50 transition-smooth">
        <div class="max-w-[1600px] mx-auto px-6">
            <div class="flex justify-between h-16">
                <!-- Логотип -->
                <div class="flex items-center">
                    <a href="/" class="flex items-center space-x-2 text-xl font-bold text-gray-800 hover:text-blue-600 transition-fast">
                        <div class="bg-blue-600 p-1.5 rounded-lg shadow-md">
                            <i class="fas fa-file-alt text-white text-sm"></i>
                        </div>
                        <span class="hidden sm:inline-block">DocFlow</span>
                    </a>
                </div>

                <!-- Десктопное меню и профиль -->
                <div class="flex items-center space-x-4">
                    <!-- Кнопка мобильного меню (бургер) -->
                    <button id="mobileMenuBtn" class="md:hidden text-gray-600 hover:text-blue-600 focus:outline-none">
                        <i class="fas fa-bars text-xl"></i>
                    </button>

                    <!-- Контейнер для авторизованного пользователя -->
                    <div id="user-nav" class="hidden md:flex items-center space-x-4">
                        <!-- Загрузка будет вставлена через JS -->
                    </div>
                </div>
            </div>
        </div>

        <!-- Мобильное выпадающее меню -->
        <div id="mobileMenu" class="mobile-menu md:hidden">
            <div class="px-4 py-2 space-y-2" id="mobileUserNav"></div>
        </div>
    </nav>

    <!-- Основной контент -->
    <main class="flex-1 w-full max-w-[1600px] mx-auto px-4 sm:px-6 lg:px-8 py-6">
        {% block content %}{% endblock %}
    </main>

    <!-- Футер -->
    <footer class="bg-white border-t border-blue-100 mt-12 py-6 text-center text-gray-500 text-sm">
        <div class="max-w-7xl mx-auto px-4">
            <p>&copy; 2025 Документооборот. Все права защищены.</p>
            <div class="mt-2 flex justify-center space-x-4">
                <a href="#" class="hover:text-blue-600 transition-fast"><i class="fab fa-telegram"></i></a>
                <a href="#" class="hover:text-blue-600 transition-fast"><i class="fab fa-github"></i></a>
                <a href="#" class="hover:text-blue-600 transition-fast"><i class="fas fa-envelope"></i></a>
            </div>
        </div>
    </footer>

    <script>

        async function logout() {
            try {
                await fetch('/logout', {
                    method: 'POST',
                    credentials: 'include'
                });
            } catch (e) {}

            window.location.href = '/login';
        }

        // Получение инициалов для аватара
        function getInitials(fullName) {
            if (!fullName) return '?';
            const parts = fullName.trim().split(/\s+/);
            if (parts.length === 1) return parts[0].charAt(0).toUpperCase();
            return (parts[0].charAt(0) + parts[parts.length-1].charAt(0)).toUpperCase();
        }

        // Обновление навигации (десктоп и мобилка)
        function updateNav() {
            const navDesktop = document.getElementById('user-nav');
            const navMobile = document.getElementById('mobileUserNav');



            // Запрос информации о пользователе
            fetch('/users/me', {
                credentials: 'include'
                })
                .then(res => {
                    if (res.status === 401) {
                        window.location.href = '/login';
                        return null;
                    }
                    return res.json();
                })
                .then(user => {
                if (user) {
                    const initials = getInitials(user.full_name);
                    const isAdmin = user.role && user.role.code === 'ADMIN';

                    // Десктопный вариант: аватар с выпадающим меню
                    navDesktop.innerHTML = `
                        <div class="dropdown relative">
                            <div class="avatar cursor-pointer flex items-center justify-center">
                                <span class="text-sm">${initials}</span>
                            </div>
                            <div class="dropdown-menu absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-lg border border-gray-100 py-1 z-50">
                                <div class="px-4 py-2 border-b border-gray-100">
                                    <p class="text-sm font-medium text-gray-800">${escapeHtml(user.full_name)}</p>
                                    <p class="text-xs text-gray-500">${user.email || ''}</p>
                                </div>
                                ${isAdmin ? `<a href="/admin/users" class="block px-4 py-2 text-sm text-gray-700 hover:bg-blue-50 hover:text-blue-600 transition-fast">
                                    <i class="fas fa-users mr-2"></i>Управление пользователями
                                </a>` : ''}
                                <button onclick="logout()" class="block w-full text-left px-4 py-2 text-sm text-red-600 hover:bg-red-50 transition-fast">
                                    <i class="fas fa-sign-out-alt mr-2"></i>Выйти
                                </button>
                            </div>
                        </div>
                    `;

                    // Мобильный вариант: список ссылок
                    navMobile.innerHTML = `
                        <div class="py-2 border-b border-gray-100">
                            <p class="font-medium">${escapeHtml(user.full_name)}</p>
                            <p class="text-sm text-gray-500">${user.email || ''}</p>
                        </div>
                        ${isAdmin ? `<a href="/admin/users" class="block py-2 text-gray-700 hover:text-blue-600 transition-fast">
                            <i class="fas fa-users mr-2"></i>Пользователи
                        </a>` : ''}
                        <button onclick="logout()" class="block w-full text-left py-2 text-red-600 hover:text-red-700 transition-fast">
                            <i class="fas fa-sign-out-alt mr-2"></i>Выйти
                        </button>
                    `;

                    navDesktop.classList.remove('hidden');
                } else {
                    // Токен невалиден
                    const guestHtml = `<a href="/login" class="text-gray-700 hover:text-blue-600">Вход</a>`;
                    navDesktop.innerHTML = guestHtml;
                    navMobile.innerHTML = guestHtml;
                }
            })
            .catch(() => {
                const guestHtml = `<a href="/login" class="text-gray-700 hover:text-blue-600">Вход</a>`;
                navDesktop.innerHTML = guestHtml;
                navMobile.innerHTML = guestHtml;
            });
        }

        // Мобильное меню: открыть/закрыть
        function initMobileMenu() {
            const btn = document.getElementById('mobileMenuBtn');
            const menu = document.getElementById('mobileMenu');
            if (btn && menu) {
                btn.addEventListener('click', () => {
                    menu.classList.toggle('open');
                });
                // Закрыть при клике вне меню
                document.addEventListener('click', (e) => {
                    if (!menu.contains(e.target) && !btn.contains(e.target)) {
                        menu.classList.remove('open');
                    }
                });
            }
        }

        // Функция для безопасного экранирования
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            updateNav();
            initMobileMenu();
        });
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
