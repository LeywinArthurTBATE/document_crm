{% extends "base.html" %}

{% block title %}Мои документы{% endblock %}

{% block extra_head %}
<style>
    /* Анимации и дополнительные стили */
    .fade-in {
        animation: fadeIn 0.3s ease-in-out;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .card {
        transition: all 0.25s ease;
        border-radius: 1rem;
        background: white;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
    }
    .card:hover {
        transform: translateY(-4px);
        box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.02);
    }

    .grid-view {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
        gap: 1.5rem;
    }

    .status-badge {
        display: inline-flex;
        align-items: center;
        padding: 0.25rem 0.75rem;
        border-radius: 9999px;
        font-size: 0.75rem;
        font-weight: 600;
        line-height: 1.25rem;
    }

    .view-toggle button {
        transition: all 0.2s;
    }
    .view-toggle .active {
        background-color: #2563eb;
        color: white;
        border-color: #2563eb;
    }
    .view-toggle .active i {
        color: white;
    }

    .loading-spinner {
        display: inline-block;
        width: 2rem;
        height: 2rem;
        border: 3px solid rgba(59,130,246,0.3);
        border-radius: 50%;
        border-top-color: #3b82f6;
        animation: spin 0.6s linear infinite;
    }
    @keyframes spin {
        to { transform: rotate(360deg); }
    }

    .toast {
        position: fixed;
        bottom: 1.5rem;
        right: 1.5rem;
        background: #1f2937;
        color: white;
        padding: 0.75rem 1.25rem;
        border-radius: 0.5rem;
        box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        z-index: 1000;
        animation: slideUp 0.3s ease;
        font-size: 0.875rem;
        font-weight: 500;
    }
    @keyframes slideUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    /* Плавное переключение видов */
    .view-container {
        transition: opacity 0.2s ease;
    }
    .hidden-view {
        display: none;
    }

    /* Модальное окно с анимацией */
    .modal {
        transition: opacity 0.2s ease;
    }
    .modal-content {
        transform: scale(0.95);
        transition: transform 0.2s ease;
    }
    .modal.show .modal-content {
        transform: scale(1);
    }

    /* Адаптивность для карточек */
    @media (max-width: 640px) {
        .grid-view {
            grid-template-columns: 1fr;
        }
    }
</style>
{% endblock %}

{% block content %}
<div class="bg-white w-full rounded-2xl shadow-sm border border-blue-100 p-6 mb-6 fade-in">
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6">
        <h1 class="text-2xl font-bold text-gray-800 flex items-center gap-2">
            <i class="fas fa-folder-open text-blue-500"></i>
            Документы
        </h1>
        <div class="flex items-center gap-3">
            <!-- Переключатель вида -->
            <div class="view-toggle flex bg-gray-100 rounded-lg p-1">
                <button id="tableViewBtn" class="px-3 py-1.5 rounded-md text-sm font-medium flex items-center gap-1 transition-all active">
                    <i class="fas fa-table text-xs"></i>
                    <span>Таблица</span>
                </button>
                <button id="cardViewBtn" class="px-3 py-1.5 rounded-md text-sm font-medium flex items-center gap-1 transition-all">
                    <i class="fas fa-th-large text-xs"></i>
                    <span>Карточки</span>
                </button>
            </div>
            <button onclick="openCreateModal()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg transition-all flex items-center gap-2 shadow-sm">
                <i class="fas fa-plus text-sm"></i>
                Создать документ
            </button>
        </div>
    </div>

    <!-- Фильтры -->
    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-5 gap-4 mb-6">
        <input type="text" id="search" placeholder="Поиск по названию..." class="px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-200 focus:border-blue-400 outline-none transition">
        <select id="status" class="px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-200 focus:border-blue-400 outline-none">
            <option value="">Все статусы</option>
            <option value="NEW">Ожидает</option>
            <option value="IN_PROGRESS">В работе</option>
            <option value="ON_REVIEW">На проверке</option>
            <option value="REJECTED">Отклонено</option>
            <option value="REVISION">На доработке</option>
            <option value="CANCELLED">Отменено</option>
            <option value="PAUSED">Пауза</option>
            <option value="DONE">Выполнено</option>
        </select>
        <input type="date" id="deadline_from" placeholder="Срок с" class="px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-200">
        <input type="date" id="deadline_to" placeholder="Срок по" class="px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-200">
        <button onclick="loadDocuments()" class="bg-blue-100 text-blue-700 hover:bg-blue-200 px-4 py-2 rounded-lg transition-all flex items-center justify-center gap-1">
            <i class="fas fa-search"></i> Применить
        </button>
    </div>

    <!-- Таблица (по умолчанию видима) -->
    <div id="tableView" class="view-container overflow-x-auto">
        <table class="min-w-full bg-white border border-gray-100 rounded-xl overflow-hidden">
            <thead class="bg-gradient-to-r from-blue-50 to-indigo-50 border-b border-blue-100">
                <tr>
                    <th class="py-3 px-4 text-left text-sm font-semibold text-gray-700">Название</th>
                    <th class="py-3 px-4 text-left text-sm font-semibold text-gray-700">Статус</th>
                    <th class="py-3 px-4 text-left text-sm font-semibold text-gray-700">Исполнитель</th>
                    <th class="py-3 px-4 text-left text-sm font-semibold text-gray-700">Срок</th>
                    <th class="py-3 px-4 text-left text-sm font-semibold text-gray-700">Просрочен</th>
                    <th class="py-3 px-4 text-left text-sm font-semibold text-gray-700">Файл</th>
                    <th class="py-3 px-4 text-left text-sm font-semibold text-gray-700">Действия</th>
                </tr>
            </thead>
            <tbody id="documentsList">
                <tr><td colspan="7" class="text-center py-8"><div class="loading-spinner mx-auto"></div></td></tr>
            </tbody>
        </table>
    </div>

    <!-- Карточки (скрыты по умолчанию) -->
    <div id="cardView" class="view-container hidden-view">
        <div id="cardsContainer" class="grid-view"></div>
    </div>
</div>

<!-- Модальное окно с анимацией -->
<div id="modal" class="modal fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden transition-all duration-200">
    <div class="modal-content bg-white rounded-2xl shadow-xl w-full max-w-lg p-6 border border-blue-100">
        <div class="flex justify-between items-center mb-4">
            <h3 id="modalTitle" class="text-xl font-bold text-gray-800">Создать документ</h3>
            <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 text-2xl leading-none">&times;</button>
        </div>
        <form id="documentForm" enctype="multipart/form-data">
            <input type="hidden" id="docId">
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-semibold mb-1">Название *</label>
                <input type="text" id="title" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-200 focus:border-blue-400 outline-none">
            </div>
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-semibold mb-1">Описание</label>
                <textarea id="description" rows="3" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-200"></textarea>
            </div>
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-semibold mb-1">Исполнитель</label>
                <select id="executor_id" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-200">
                    <option value="">Я</option>
                </select>
            </div>
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-semibold mb-1">Срок *</label>
                <input type="date" id="deadline" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-200">
            </div>
            <div id="fileInputWrapper" class="mb-4">
                <label class="block text-gray-700 text-sm font-semibold mb-1">Файл *</label>
                <input type="file" id="file" accept=".pdf,.doc,.docx,.xls,.xlsx,.jpg,.png,.webp" class="w-full border border-gray-300 rounded-lg p-2">
            </div>
            <div id="statusWrapper" class="mb-4 hidden">
                <label class="block text-gray-700 text-sm font-semibold mb-1">Статус</label>
                <select id="statusSelect" class="w-full px-4 py-2 border border-gray-300 rounded-lg">
                    <option value="NEW">Ожидает</option>
                    <option value="IN_PROGRESS">В работе</option>
                    <option value="ON_REVIEW">На проверке</option>
                    <option value="REJECTED">Отклонено</option>
                    <option value="REVISION">На доработке</option>
                    <option value="CANCELLED">Отменено</option>
                    <option value="PAUSED">Пауза</option>
                    <option value="DONE">Выполнено</option>
                </select>
            </div>
            <div class="flex justify-end gap-3 mt-6">
                <button type="button" onclick="closeModal()" class="px-4 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50 transition">Отмена</button>
                <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg transition shadow-sm">Сохранить</button>
            </div>
        </form>
    </div>
</div>

<script>
    let currentUser = null;
    let currentView = 'table'; // 'table' или 'card'

    // --- Вспомогательные функции ---
    function showToast(message, type = 'success') {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'} mr-2"></i>${message}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    const STATUS_MAP = {
        NEW: { text: 'Ожидает', class: 'bg-yellow-100 text-yellow-800' },
        IN_PROGRESS: { text: 'В работе', class: 'bg-blue-100 text-blue-800' },
        ON_REVIEW: { text: 'На проверке', class: 'bg-purple-100 text-purple-800' },
        REJECTED: { text: 'Отклонено', class: 'bg-red-100 text-red-800' },
        REVISION: { text: 'На доработке', class: 'bg-orange-100 text-orange-800' },
        CANCELLED: { text: 'Отменено', class: 'bg-gray-100 text-gray-800' },
        PAUSED: { text: 'Пауза', class: 'bg-gray-200 text-gray-700' },
        DONE: { text: 'Выполнено', class: 'bg-green-100 text-green-800' },
    };
    function getStatusText(status) { return STATUS_MAP[status]?.text || status; }
    function getStatusClass(status) { return STATUS_MAP[status]?.class || 'bg-gray-100'; }

    // --- Загрузка пользователей ---
    async function loadUsers() {
        try {
            const meRes = await fetch('/users/me', {
                credentials: 'include'
            });
            if (meRes.ok) currentUser = await meRes.json();

            const usersRes = await fetch('/users', {
                credentials: 'include'
            });
            if (!usersRes.ok) return;
            const users = await usersRes.json();
            const select = document.getElementById('executor_id');
            select.innerHTML = '<option value="">Я</option>';
            users.forEach(u => {
                const option = document.createElement('option');
                option.value = u.id;
                option.textContent = u.full_name;
                select.appendChild(option);
            });
        } catch (err) { console.error(err); }
    }

    // --- Рендер таблицы ---
    function renderTable(docs) {
        const tbody = document.getElementById('documentsList');
        if (!docs.length) {
            tbody.innerHTML = '<tr><td colspan="7" class="text-center py-8 text-gray-500">Нет документов</td></tr>';
            return;
        }
        tbody.innerHTML = docs.map(doc => `
            <tr class="border-b border-gray-100 hover:bg-gray-50 transition">
                <td class="py-3 px-4"><a href="/documents/${doc.id}/view" class="text-blue-600 hover:underline font-medium">${escapeHtml(doc.title)}</a></td>
                <td class="py-3 px-4"><span class="status-badge ${getStatusClass(doc.status)}">${getStatusText(doc.status)}</span></td>
                <td class="py-3 px-4">${escapeHtml(doc.executor_name || 'Я')}</td>
                <td class="py-3 px-4">${doc.deadline || '—'}</td>
                <td class="py-3 px-4">${doc.is_overdue ? '<i class="fas fa-exclamation-triangle text-red-500" title="Просрочено"></i>' : '—'}</td>
                <td class="py-3 px-4">${doc.file_name ? `<button onclick="downloadDocument('${doc.id}', '${escapeHtml(doc.file_name)}')" class="text-blue-500 hover:text-blue-700"><i class="fas fa-download"></i></button>` : '—'}</td>
                <td class="py-3 px-4 space-x-3">
                    <button onclick="editDocument('${doc.id}')" class="text-blue-600 hover:text-blue-800"><i class="fas fa-edit"></i></button>
                    <button onclick="deleteDocument('${doc.id}')" class="text-red-500 hover:text-red-700"><i class="fas fa-trash"></i></button>
                </td>
            </tr>
        `).join('');
    }

    // --- Рендер карточек ---
    function renderCards(docs) {
        const container = document.getElementById('cardsContainer');
        if (!docs.length) {
            container.innerHTML = '<div class="col-span-full text-center py-12 text-gray-500">Нет документов</div>';
            return;
        }
        container.innerHTML = docs.map(doc => `
            <div class="card p-5 fade-in border border-gray-100">
                <div class="flex justify-between items-start mb-3">
                    <h3 class="font-bold text-lg text-gray-800 line-clamp-2">
                        <a href="/documents/${doc.id}/view" class="hover:text-blue-600 transition">${escapeHtml(doc.title)}</a>
                    </h3>
                    <span class="status-badge ${getStatusClass(doc.status)}">${getStatusText(doc.status)}</span>
                </div>
                <p class="text-gray-600 text-sm mb-4 line-clamp-2">${escapeHtml(doc.description) || 'Нет описания'}</p>
                <div class="border-t border-gray-100 pt-3 text-sm space-y-1">
                    <div class="flex items-center gap-2 text-gray-600"><i class="fas fa-user w-4"></i> <span>${escapeHtml(doc.executor_name || 'Я')}</span></div>
                    <div class="flex items-center gap-2 text-gray-600"><i class="fas fa-calendar-alt w-4"></i> <span>Срок: ${doc.deadline || '—'}</span> ${doc.is_overdue ? '<span class="text-red-500 text-xs ml-1">(просрочен)</span>' : ''}</div>
                    ${doc.file_name ? `<div class="flex items-center gap-2"><i class="fas fa-paperclip w-4"></i> <button onclick="downloadDocument('${doc.id}', '${escapeHtml(doc.file_name)}')" class="text-blue-500 hover:underline">${escapeHtml(doc.file_name)}</button></div>` : ''}
                </div>
                <div class="flex justify-end gap-3 mt-4 pt-2 border-t border-gray-50">
                    <button onclick="editDocument('${doc.id}')" class="text-blue-500 hover:text-blue-700 text-sm"><i class="fas fa-edit mr-1"></i>Править</button>
                    <button onclick="deleteDocument('${doc.id}')" class="text-red-500 hover:text-red-700 text-sm"><i class="fas fa-trash mr-1"></i>Удалить</button>
                </div>
            </div>
        `).join('');
    }

    // --- Загрузка документов с фильтрами ---
    async function loadDocuments() {
        const params = new URLSearchParams();
        const search = document.getElementById('search').value;
        const status = document.getElementById('status').value;
        const deadline_from = document.getElementById('deadline_from').value;
        const deadline_to = document.getElementById('deadline_to').value;
        if (search) params.append('search', search);
        if (status) params.append('status', status);
        if (deadline_from) params.append('deadline_from', deadline_from);
        if (deadline_to) params.append('deadline_to', deadline_to);
        params.append('limit', '100');

        // Показываем лоадер
        document.getElementById('documentsList').innerHTML = '<tr><td colspan="7" class="text-center py-8"><div class="loading-spinner mx-auto"></div></td></tr>';
        document.getElementById('cardsContainer').innerHTML = '<div class="col-span-full text-center py-12"><div class="loading-spinner mx-auto"></div></div>';

        try {
            const response = await fetch(`/documents?${params.toString()}`, {
                credentials: 'include'
            });
            if (!response.ok) throw new Error();
            const docs = await response.json();
            renderTable(docs);
            renderCards(docs);
        } catch (err) {
            document.getElementById('documentsList').innerHTML = '<tr><td colspan="7" class="text-center py-8 text-red-500">Ошибка загрузки</td></tr>';
            document.getElementById('cardsContainer').innerHTML = '<div class="col-span-full text-center py-12 text-red-500">Ошибка загрузки</div>';
        }
    }

    // --- Скачивание файла ---
    async function downloadDocument(docId, fileName) {
        try {
            const res = await fetch(`/documents/${docId}/download`, {
                credentials: 'include'
            });
            if (!res.ok) throw new Error();
            const blob = await res.blob();
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = fileName || 'file';
            document.body.appendChild(a);
            a.click();
            a.remove();
            window.URL.revokeObjectURL(url);
        } catch (err) {
            showToast('Не удалось скачать файл', 'error');
        }
    }

    // --- Модальное окно ---
    let currentDocId = null;
    function openCreateModal() {
        currentDocId = null;
        document.getElementById('modalTitle').innerText = 'Создать документ';
        document.getElementById('documentForm').reset();
        document.getElementById('fileInputWrapper').classList.remove('hidden');
        document.getElementById('statusWrapper').classList.add('hidden');
        document.getElementById('modal').classList.remove('hidden');
        loadUsers();
    }
    async function editDocument(docId) {
        try {
            const res = await fetch(`/documents/${docId}`, {
                credentials: 'include'
            });
            if (!res.ok) throw new Error();
            const doc = await res.json();
            currentDocId = doc.id;
            document.getElementById('modalTitle').innerText = 'Редактировать документ';
            document.getElementById('title').value = doc.title;
            document.getElementById('description').value = doc.description || '';
            document.getElementById('executor_id').value = doc.executor_id || '';
            document.getElementById('deadline').value = doc.deadline;
            document.getElementById('statusSelect').value = doc.status;
            document.getElementById('fileInputWrapper').classList.add('hidden');
            document.getElementById('statusWrapper').classList.remove('hidden');
            document.getElementById('modal').classList.remove('hidden');
        } catch (err) {
            showToast('Не удалось загрузить документ', 'error');
        }
    }
    function closeModal() {
        document.getElementById('modal').classList.add('hidden');
        currentDocId = null;
    }

    // --- Отправка формы ---
    document.getElementById('documentForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        if (currentDocId) {
            // Редактирование
            const payload = {};
            const title = document.getElementById('title').value;
            const description = document.getElementById('description').value;
            const executor_id = document.getElementById('executor_id').value;
            const deadline = document.getElementById('deadline').value;
            const status = document.getElementById('statusSelect').value;
            if (title) payload.title = title;
            if (description) payload.description = description;
            if (executor_id) payload.executor_id = executor_id;
            if (deadline) payload.deadline = deadline;
            if (status) payload.status = status;

            try {
                const res = await fetch(`/documents/${currentDocId}`, {
                    method: 'PATCH',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload),
                    credentials: 'include'
                });
                if (!res.ok) throw new Error();
                closeModal();
                loadDocuments();
                showToast('Документ обновлён');
            } catch (err) {
                showToast('Ошибка обновления', 'error');
            }
        } else {
            // Создание
            const formData = new FormData();
            formData.append('title', document.getElementById('title').value);
            formData.append('description', document.getElementById('description').value);
            formData.append('executor_id', document.getElementById('executor_id').value);
            formData.append('deadline', document.getElementById('deadline').value);
            const fileInput = document.getElementById('file');
            if (fileInput.files.length === 0) {
                showToast('Выберите файл', 'error');
                return;
            }
            formData.append('file', fileInput.files[0]);

            try {
                const res = await fetch('/documents', {
                    method: 'POST',
                    body: formData,
                    credentials: 'include'
                });
                if (!res.ok) throw new Error();
                closeModal();
                loadDocuments();
                showToast('Документ создан');
            } catch (err) {
                showToast('Ошибка создания документа', 'error');
            }
        }
    });

    // --- Удаление ---
    async function deleteDocument(docId) {
        if (!confirm('Удалить документ?')) return;
        try {
            const res = await fetch(`/documents/${docId}`, {
                method: 'DELETE',
                credentials: 'include'
            });
            if (!res.ok) throw new Error();
            loadDocuments();
            showToast('Документ удалён');
        } catch (err) {
            showToast('Ошибка удаления', 'error');
        }
    }


    // --- Переключение вида (таблица/карточки) ---
    function setView(view) {
        currentView = view;
        const tableView = document.getElementById('tableView');
        const cardView = document.getElementById('cardView');
        const tableBtn = document.getElementById('tableViewBtn');
        const cardBtn = document.getElementById('cardViewBtn');

        if (view === 'table') {
            tableView.classList.remove('hidden-view');
            cardView.classList.add('hidden-view');
            tableBtn.classList.add('active');
            cardBtn.classList.remove('active');
        } else {
            tableView.classList.add('hidden-view');
            cardView.classList.remove('hidden-view');
            cardBtn.classList.add('active');
            tableBtn.classList.remove('active');
        }
        localStorage.setItem('documentsView', view);
    }

    // --- Инициализация и обработчики переключения ---
    document.addEventListener('DOMContentLoaded', () => {
        // Восстанавливаем сохранённый вид
        const savedView = localStorage.getItem('documentsView');
        if (savedView === 'card') setView('card');
        else setView('table');

        document.getElementById('tableViewBtn').addEventListener('click', () => setView('table'));
        document.getElementById('cardViewBtn').addEventListener('click', () => setView('card'));

        loadDocuments();
    });
</script>
{% endblock %}
