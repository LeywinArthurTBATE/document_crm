{% extends "base.html" %}

{% block title %}Мои документы{% endblock %}

{% block content %}
<div class="bg-white rounded-xl shadow-md p-6 mb-6 border border-blue-100">
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-2xl font-bold text-gray-800"><i class="fas fa-folder-open text-blue-500 mr-2"></i>Документы</h1>
        <button onclick="openCreateModal()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg transition-fast">
            <i class="fas fa-plus mr-2"></i>Создать документ
        </button>
    </div>

    <!-- Фильтры -->
    <div class="grid grid-cols-1 md:grid-cols-5 gap-4 mb-6">
        <input type="text" id="search" placeholder="Поиск по названию..." class="px-4 py-2 border border-gray-300 rounded-lg">
        <select id="status" class="px-4 py-2 border border-gray-300 rounded-lg">
            <option value="">Все статусы</option>
            <option value="NEW">Ожидает</option>
            <option value="IN_PROGRESS">В работе</option>
            <option value="ON_REVIEW">На проверке</option>
            <option value="REJECTED">Отклонено</option>
            <option value="REVISION">На доработке</option>
            <option value="CANCELLED">Отменено</option>
            <option value="PAUSED">Пауза</option>
            <option value="DONE">Выполнено</option>
        </select>
        <input type="date" id="deadline_from" class="px-4 py-2 border border-gray-300 rounded-lg">
        <input type="date" id="deadline_to" class="px-4 py-2 border border-gray-300 rounded-lg">
        <button onclick="loadDocuments()" class="bg-blue-100 text-blue-700 hover:bg-blue-200 px-4 py-2 rounded-lg transition-fast">
            <i class="fas fa-search mr-1"></i>Применить
        </button>
    </div>

    <!-- Таблица документов -->
    <div class="overflow-x-auto">
        <table class="min-w-full bg-white">
            <thead class="bg-blue-50 border-b border-blue-200">
                <tr>
                    <th class="py-3 px-4 text-left text-sm font-semibold text-gray-700">Название</th>
                    <th class="py-3 px-4 text-left text-sm font-semibold text-gray-700">Статус</th>
                    <th class="py-3 px-4 text-left text-sm font-semibold text-gray-700">Исполнитель</th>
                    <th class="py-3 px-4 text-left text-sm font-semibold text-gray-700">Срок</th>
                    <th class="py-3 px-4 text-left text-sm font-semibold text-gray-700">Просрочен</th>
                    <th class="py-3 px-4 text-left text-sm font-semibold text-gray-700">Файл</th>
                    <th class="py-3 px-4 text-left text-sm font-semibold text-gray-700">Действия</th>
                </tr>
            </thead>
            <tbody id="documentsList">
                <tr><td colspan="7" class="text-center py-4">Загрузка...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Модальное окно создания/редактирования -->
<div id="modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden transition-all">
    <div class="bg-white rounded-xl shadow-2xl w-full max-w-lg p-6 border border-blue-100">
        <div class="flex justify-between items-center mb-4">
            <h3 id="modalTitle" class="text-xl font-bold text-gray-800">Создать документ</h3>
            <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600">&times;</button>
        </div>
        <form id="documentForm" enctype="multipart/form-data">
            <input type="hidden" id="docId" name="docId">
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-semibold mb-2">Название *</label>
                <input type="text" id="title" name="title" required class="w-full px-4 py-2 border border-gray-300 rounded-lg">
            </div>
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-semibold mb-2">Описание</label>
                <textarea id="description" name="description" rows="3" class="w-full px-4 py-2 border border-gray-300 rounded-lg"></textarea>
            </div>
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-semibold mb-2">Исполнитель (ID)</label>
                <select id="executor_id" class="w-full px-4 py-2 border border-gray-300 rounded-lg">
                    <option value="">Я</option>
                </select>
            </div>
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-semibold mb-2">Срок *</label>
                <input type="date" id="deadline" name="deadline" required class="w-full px-4 py-2 border border-gray-300 rounded-lg">
            </div>
            <div class="mb-4" id="fileInputWrapper">
                <label class="block text-gray-700 text-sm font-semibold mb-2">Файл *</label>
                <input type="file"
                       id="file"
                       name="file"
                       accept=".pdf,.doc,.docx,.xls,.xlsx,.jpg,.png,.webp"
                       class="w-full border border-gray-300 rounded-lg p-2">
            </div>
            <div class="mb-4 hidden" id="statusWrapper">
                <label class="block text-gray-700 text-sm font-semibold mb-2">Статус</label>
                <select id="statusSelect" name="status" class="w-full px-4 py-2 border border-gray-300 rounded-lg">
                    <option value="NEW">Ожидает</option>
                    <option value="IN_PROGRESS">В работе</option>
                    <option value="ON_REVIEW">На проверке</option>
                    <option value="REJECTED">Отклонено</option>
                    <option value="REVISION">На доработке</option>
                    <option value="CANCELLED">Отменено</option>
                    <option value="PAUSED">Пауза</option>
                    <option value="DONE">Выполнено</option>
                </select>
            </div>
            <div class="flex justify-end space-x-3">
                <button type="button" onclick="closeModal()" class="px-4 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50">Отмена</button>
                <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg">Сохранить</button>
            </div>
        </form>
    </div>
</div>

<script>

    let currentUser = null;

    async function loadUsers() {
        const token = getToken();

        // текущий пользователь
        const meRes = await fetch('/users/me', {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        currentUser = await meRes.json();

        // список пользователей
        const res = await fetch('/users', {
            headers: { 'Authorization': `Bearer ${token}` }
        });

        const users = await res.json();

        const select = document.getElementById('executor_id');

        select.innerHTML = '<option value="">Я</option>';

        users.forEach(u => {
            const option = document.createElement('option');
            option.value = u.id;
            option.textContent = u.full_name;
            select.appendChild(option);
        });
    }
    // Загрузка документов
    async function loadDocuments() {
        const token = getToken();
        if (!token) {
            window.location.href = '/login';
            return;
        }

        const params = new URLSearchParams();
        const search = document.getElementById('search').value;
        const status = document.getElementById('status').value;
        const deadline_from = document.getElementById('deadline_from').value;
        const deadline_to = document.getElementById('deadline_to').value;
        if (search) params.append('search', search);
        if (status) params.append('status', status);
        if (deadline_from) params.append('deadline_from', deadline_from);
        if (deadline_to) params.append('deadline_to', deadline_to);
        params.append('limit', '100');

        const url = `/documents?${params.toString()}`;
        try {
            const response = await fetch(url, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (!response.ok) throw new Error('Ошибка загрузки');
            const docs = await response.json();
            renderDocuments(docs);
        } catch (err) {
            console.error(err);
            document.getElementById('documentsList').innerHTML = '<tr><td colspan="7" class="text-center py-4 text-red-500">Ошибка загрузки документов</td></tr>';
        }
    }
    async function downloadDocument(docId, fileName) {
        const token = getToken();
        if (!token) {
            window.location.href = '/login';
            return;
        }

        try {
            const res = await fetch(`/documents/${docId}/download`, {
                headers: {
                    'Authorization': `Bearer ${token}`
                }
            });

            if (!res.ok) {
                throw new Error(`Ошибка скачивания: ${res.status}`);
            }

            const blob = await res.blob();
            const url = window.URL.createObjectURL(blob);

            const a = document.createElement("a");
            a.href = url;
            a.download = fileName || "file";
            document.body.appendChild(a);
            a.click();
            a.remove();

            window.URL.revokeObjectURL(url);

        } catch (err) {
            console.error(err);
            alert("Не удалось скачать файл");
        }
    }

    function renderDocuments(docs) {
        const tbody = document.getElementById('documentsList');
        if (!docs.length) {
            tbody.innerHTML = '<tr><td colspan="7" class="text-center py-4">Нет документов</td></tr>';
            return;
        }

        tbody.innerHTML = docs.map(doc => `
            <tr class="border-b border-gray-200 hover:bg-gray-50">
                <td class="py-3 px-4">${escapeHtml(doc.title)}</td>
                <td class="py-3 px-4">
                    <span class="px-2 py-1 rounded-full text-xs font-semibold ${getStatusClass(doc.status)}">
                        ${getStatusText(doc.status)}
                    </span>
                </td>
                <td class="py-3 px-4">
                    ${doc.executor_name || 'Я'}
                </td>
                <td class="py-3 px-4">${doc.deadline}</td>
                <td class="py-3 px-4">${doc.is_overdue ? '<i class="fas fa-exclamation-triangle text-red-500"></i>' : '-'}</td>
                <td class="py-3 px-4">
                ${doc.file_name
                  ? `<button onclick="downloadDocument('${doc.id}', '${doc.file_name}')" class="text-blue-600 hover:underline">
                        <i class="fas fa-download"></i>
                     </button>`
                  : '-'}
                </td>
                <td class="py-3 px-4 space-x-2">
                    <button onclick="editDocument('${doc.id}')" class="text-blue-600 hover:text-blue-800"><i class="fas fa-edit"></i></button>
                    <button onclick="deleteDocument('${doc.id}')" class="text-red-500 hover:text-red-700"><i class="fas fa-trash"></i></button>
                    <button onclick="viewHistory('${doc.id}')" class="text-gray-600 hover:text-gray-800"><i class="fas fa-history"></i></button>
                </td>
            </tr>
        `).join('');
    }
    const STATUS_MAP = {
        NEW: { text: 'Ожидает', class: 'bg-yellow-100 text-yellow-800' },
        IN_PROGRESS: { text: 'В работе', class: 'bg-blue-100 text-blue-800' },
        ON_REVIEW: { text: 'На проверке', class: 'bg-purple-100 text-purple-800' },
        REJECTED: { text: 'Отклонено', class: 'bg-red-100 text-red-800' },
        REVISION: { text: 'На доработке', class: 'bg-orange-100 text-orange-800' },
        CANCELLED: { text: 'Отменено', class: 'bg-gray-100 text-gray-800' },
        PAUSED: { text: 'Пауза', class: 'bg-gray-200 text-gray-700' },
        DONE: { text: 'Выполнено', class: 'bg-green-100 text-green-800' },
    };
    function getStatusText(status) {
        return STATUS_MAP[status]?.text || status;
    }

    function getStatusClass(status) {
        return STATUS_MAP[status]?.class || 'bg-gray-100';
    }
        function escapeHtml(str) {
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

    // Модальное окно создания/редактирования
    let currentDocId = null;
    function openCreateModal() {
        currentDocId = null;
        document.getElementById('modalTitle').innerText = 'Создать документ';
        document.getElementById('documentForm').reset();
        document.getElementById('fileInputWrapper').classList.remove('hidden');
        document.getElementById('statusWrapper').classList.add('hidden');
        document.getElementById('modal').classList.remove('hidden');
        loadUsers();
    }

    async function editDocument(docId) {
        const token = getToken();
        if (!token) return;
        try {
            const response = await fetch(`/documents/${docId}`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (!response.ok) throw new Error();
            const doc = await response.json();
            currentDocId = doc.id;
            document.getElementById('modalTitle').innerText = 'Редактировать документ';
            document.getElementById('title').value = doc.title;
            document.getElementById('description').value = doc.description || '';
            document.getElementById('executor_id').value = doc.executor_id || '';
            document.getElementById('deadline').value = doc.deadline;
            document.getElementById('statusSelect').value = doc.status;
            document.getElementById('fileInputWrapper').classList.add('hidden');
            document.getElementById('statusWrapper').classList.remove('hidden');
            document.getElementById('modal').classList.remove('hidden');
        } catch (err) {
            alert('Не удалось загрузить документ');
        }
    }

    function closeModal() {
        document.getElementById('modal').classList.add('hidden');
        currentDocId = null;
    }

    // Отправка формы
    document.getElementById('documentForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const token = getToken();
        if (!token) return;

        const formData = new FormData();
        if (currentDocId) {
            // Редактирование: PATCH
            const title = document.getElementById('title').value;
            const description = document.getElementById('description').value;
            const executor_id = document.getElementById('executor_id').value;
            const deadline = document.getElementById('deadline').value;
            const status = document.getElementById('statusSelect').value;

            const payload = {};
            if (title) payload.title = title;
            if (description) payload.description = description;
            if (executor_id) payload.executor_id = executor_id;
            if (deadline) payload.deadline = deadline;
            if (status) payload.status = status;

            try {
                const response = await fetch(`/documents/${currentDocId}`, {
                    method: 'PATCH',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });
                if (!response.ok) throw new Error();
                closeModal();
                loadDocuments();
            } catch (err) {
                alert('Ошибка обновления документа');
            }
        } else {
            // Создание: POST multipart
            formData.append('title', document.getElementById('title').value);
            formData.append('description', document.getElementById('description').value);
            formData.append('executor_id', document.getElementById('executor_id').value);
            formData.append('deadline', document.getElementById('deadline').value);
            const fileInput = document.getElementById('file');
            if (fileInput.files.length === 0) {
                alert('Выберите файл');
                return;
            }
            formData.append('file', fileInput.files[0]);

            try {
                const response = await fetch('/documents', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` },
                    body: formData
                });

                if (!response.ok) {
                    let errorText = "Ошибка создания документа";

                    try {
                        const data = await response.json();
                        errorText = data.detail || errorText;
                    } catch (e) {
                        errorText = await response.text();
                    }

                    throw new Error(errorText);
                }
            } catch (err) {
                alert(err.message);
            }
        }
    });

    async function deleteDocument(docId) {
        if (!confirm('Удалить документ?')) return;
        const token = getToken();
        if (!token) return;
        try {
            const response = await fetch(`/documents/${docId}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (!response.ok) throw new Error();
            loadDocuments();
        } catch (err) {
            alert('Ошибка удаления');
        }
    }

    async function viewHistory(docId) {
        const token = getToken();
        if (!token) return;
        try {
            const response = await fetch(`/documents/${docId}/history`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (!response.ok) throw new Error();
            const history = await response.json();
            if (history.length === 0) {
                alert('История изменений пуста');
                return;
            }
            let msg = 'История изменений:\n';
            history.forEach(h => {
                msg += `${new Date(h.created_at).toLocaleString()} — ${h.field}: "${h.old_value}" → "${h.new_value}" (пользователь ${h.changed_by})\n`;
            });
            alert(msg);
        } catch (err) {
            alert('Не удалось загрузить историю');
        }
    }

    // Загрузка при загрузке страницы
    document.addEventListener('DOMContentLoaded', loadDocuments);
</script>
{% endblock %}
